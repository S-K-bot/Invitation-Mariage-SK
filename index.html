<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
 <title>Invitation de Mariage</title>
 <style>
 body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle, #ffffff 0%, #e2e8f0 100%); margin: 0; padding: 10px; overflow: hidden; box-sizing: border-box; }
 .envelope-wrapper { position: relative; cursor: pointer; perspective: 2000px; display: flex; justify-content: center; align-items: center; width: 95vw; max-width: 420px; aspect-ratio: 1 / 1; transform: translateY(114px) !important; opacity: 0.3; pointer-events: none; transition: opacity 0.5s ease; }
 .envelope-wrapper.ready { opacity: 1; pointer-events: auto; }
 
 .envelope { position: relative; width: 100%; height: 100%; background-color: #ffffff; box-shadow: 0 20px 45px rgba(0, 0, 0, 0.1); transform-style: preserve-3d; transition: transform 0.5s ease; overflow: hidden; }
 .envelope.reveal-card { overflow: visible !important; }
 .envelope-wrapper:hover .envelope { transform: translateY(-5px) rotateX(5deg); }
 
 .envelope-back {
   position: absolute;
   top: 0;
   left: 0;
   width: 100%;
   height: 100%;
   background-color: #ffffff; 
   box-shadow: inset 0 0 20px rgba(0,0,0,0.02); 
   z-index: 1;
 }

 .flap {
   position: absolute;
   top: 0;
   left: 0;
   width: 100% !important;
   height: 50% !important;
   background-color: transparent; 
   clip-path: polygon(0 0, 100% 0, 50% 100%); 
   transform-origin: top center;
   transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0s linear 0.3s, z-index 0.1s step-end;
   z-index: 4; 
   border: none !important;
 }
 
 .envelope-wrapper.open .flap {
   transform: rotateX(180deg);
   background-color: #ffffff; 
   box-shadow: inset 0 0 10px rgba(0,0,0,0.03); 
   z-index: 1; 
   transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), background-color 0s linear 0.3s, z-index 0.1s step-end 0.3s;
 }

 /* CORRECTIF TOTAL TRANSPARENCE : Face avant 100% opaque avec texture Canson Gaufré */
 .front-face { 
   position: absolute; 
   top: 0; 
   left: 0; 
   width: 100%; 
   height: 100%; 
   background-color: #ffffff !important; /* Opaque blanc pur */
   z-index: 3; 
   display: flex; 
   flex-direction: column; 
   /* Simulation texture papier Canson lourd pressé */
   box-shadow: inset 0 0 25px rgba(0,0,0,0.03), inset 0 0 0 3px rgba(255,255,255,1), inset 0 0 0 4px rgba(0,0,0,0.02);
 }
 
 /* Conteneur de l'illustration ajusté pour bloquer la transparence */
 .envelope-art { 
   width: 100%; 
   height: 65%; 
   overflow: hidden; 
   position: relative; 
   background-color: #ffffff; 
   /* Découpe vectorielle au ras du dessin pour ne pas rendre le bas transparent */
   clip-path: inset(0 0 0 0); 
 }
 .envelope-art img { 
   width: 100%; 
   height: 100%; 
   object-fit: contain; 
   object-position: top center; 
 }
 
 .recipient-box { 
   position: absolute; 
   bottom: 4%; 
   left: 50%; 
   width: 85%; 
   transform: translateX(-50%) !important; 
   display: flex;
   flex-direction: column;
   align-items: center;
   gap: 5px; 
   z-index: 5;
 }
 .recipient-name-text {
   font-family: "Amiri", "Traditional Arabic", "Urdu Typesetting", serif !important; 
   font-weight: 400 !important; 
   font-size: 6.5vw !important; 
   color: #2c2c2c; 
   direction: rtl; 
   text-align: center; 
   white-space: nowrap; 
   border-bottom: 1px dotted #c9ad6a; 
   padding-bottom: 2%; 
   width: 100%;
   display: block !important; 
 }
 @media (min-width: 420px) { .recipient-name-text { font-size: 26px !important; } }

 .buttons-row {
   display: flex;
   justify-content: space-between;
   align-items: center;
   width: 100%;
   padding: 0 4px;
   box-sizing: border-box;
 }

 .card { 
   position: absolute; 
   bottom: 0; 
   left: 0; 
   width: 100%; 
   height: 100%; 
   background: white; 
   z-index: 2; 
   opacity: 0; 
   visibility: hidden; 
   box-shadow: 0 0 0 rgba(0, 0, 0, 0); 
   display: flex; 
   flex-direction: column; 
   will-change: transform, opacity; 
   transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s linear 0.4s, visibility 0s linear 1.2s;
 }
 .card-image-part { position: relative; width: 100%; height: 100%; }
 .card-image-part img { width: 100%; height: 100%; object-fit: contain; }

 .envelope-wrapper.open .card { 
   opacity: 1 !important; 
   visibility: visible !important; 
   transform: translateY(-100%); 
   z-index: 2; 
   transition: transform 1.6s cubic-bezier(0.25, 1, 0.5, 1) 0.5s, opacity 0.1s linear 0.5s, visibility 0s linear 0.5s; 
 }
 .envelope-wrapper.open .card.settle { 
   z-index: 5 !important; 
   transform: translateY(-28%); 
   box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12), 0 5px 15px rgba(0, 0, 0, 0.05); 
   transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.5s ease; 
 }

 .action-btn {
   opacity: 0;
   visibility: hidden;
   transform: translateY(5px);
   transition: opacity 0.4s ease, transform 0.4s ease, background-color 0.2s, border-color 0.2s;
   user-select: none;
   -webkit-tap-highlight-color: transparent;
   box-sizing: border-box;
   white-space: nowrap;
 }

 .maps-btn {
   background-color: #ffffff;
   color: #2c3e50;
   border: 1px solid #cbd5e1;
   padding: 6px 12px;
   font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
   font-size: 11px;
   font-weight: 600;
   border-radius: 15px;
   cursor: pointer !important;
   display: inline-flex;
   align-items: center;
   gap: 6px;
   box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
 }
 .maps-btn:hover { background-color: #f8fafc; border-color: #c9ad6a; }
 .maps-btn svg { width: 14px; height: 14px; display: block; }

 .calendar-btn {
   background-color: #ffffff;
   color: #2c3e50;
   border: 1px solid #cbd5e1;
   padding: 6px 12px;
   font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
   font-size: 11px;
   font-weight: 600;
   border-radius: 15px;
   cursor: pointer;
   box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
   display: inline-flex;
   align-items: center;
   gap: 4px;
 }
 .calendar-btn:hover { background-color: #f8fafc; border-color: #c9ad6a; }
 .action-btn.show { opacity: 1; visibility: visible; transform: translateY(0); }
 </style>
</head>
<body>
 <div class="envelope-wrapper" id="envelopeContainer">
 <div class="envelope" id="envelopeBody">
   <div class="envelope-back"></div>
   <div class="flap"></div>
   <div class="card">
   <div class="card-image-part">
     <!-- LIEN PERSONNEL 1 VERROUILLÉ -->
     <img src="https://i.ibb.co/6c5bjG1Y/S-K-Invitation.png" alt="Invitation Mariage" id="invitationImg">
   </div>
   </div>
   <div class="front-face">
   <div class="envelope-art">
     <!-- LIEN PERSONNEL 2 VERROUILLÉ -->
     <img src="https://i.ibb.co/N690yZLr/face-enveloppe.jpg" alt="Illustration Cote Gammarth">
   </div>
   <div class="recipient-box">
     <div id="recipientName" class="recipient-name-text"> </div>
     <div class="buttons-row">
       <button class="action-btn maps-btn" id="mapsButton">
         <svg viewBox="0 0 24 24" xmlns="http://w3.org">
           <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="#EA4335"/>
         </svg> Google Maps
       </button>
       <button class="action-btn calendar-btn" id="calendarBtn">📅 Enregistrer la date</button>
     </div>
   </div>
   </div>
 </div>
 </div>
 <script>
 const wrapper = document.getElementById('envelopeContainer');
 const envelopeBody = document.getElementById('envelopeBody');
 const card = document.querySelector('.card');
 const img = document.getElementById('invitationImg');
 const mapsButton = document.getElementById('mapsButton');
 const recipientElement = document.getElementById('recipientName');
 const calendarButton = document.getElementById('calendarBtn');
 try {
 const currentUrl = window.location.href;
 const urlParams = new URLSearchParams(window.location.search || currentUrl.split('?')[1]);
 let guestName = urlParams.get('nom');
 if (!guestName && window.top !== window) {
 const topUrl = window.top.location.href;
 const topParams = new URLSearchParams(topUrl.split('?')[1]);
 guestName = topParams.get('nom');
 }
 if (guestName) {
 const decodedName = decodeURIComponent(guestName);
 recipientElement.innerText = " " + decodedName.replace(/_/g, ' ');
 }
 } catch(e) {
 console.log("Erreur d'URL");
 }
 function activateEnvelope() {
 wrapper.classList.add('ready');
 }
 if (img.complete) {
 activateEnvelope();
 } else {
 img.addEventListener('load', activateEnvelope);
 }
 wrapper.addEventListener('click', (event) => {
 if (event.target === mapsButton || event.target === calendarButton) return;
 if (!wrapper.classList.contains('open')) {
 wrapper.classList.add('open');
 setTimeout(() => { envelopeBody.classList.add('reveal-card'); }, 400); 
 setTimeout(() => { card.classList.add('settle'); }, 2100); 
 
 setTimeout(() => { 
   mapsButton.classList.add('show');
   calendarButton.classList.add('show'); 
 }, 2500);
 } else {
 mapsButton.classList.remove('show');
 calendarButton.classList.remove('show'); 
 card.classList.remove('settle');
 setTimeout(() => {
   wrapper.classList.remove('open');
   envelopeBody.classList.remove('reveal-card');
 }, 200);
 }
 });
 
 mapsButton.addEventListener('click', (event) => {
 event.stopPropagation();
 /* LIEN PERSONNEL 3 VERROUILLÉ */
 const absoluteWebUrl = "https://maps.app.goo.gl/fRxRzG4eXCShHXqs9";
 window.open(absoluteWebUrl, '_blank');
 });

 calendarButton.addEventListener('click', (e) => {
   e.stopPropagation();
   const icsContent = [
     "BEGIN:VCALENDAR",
     "VERSION:2.0",
     "BEGIN:VEVENT",
     "UID:" + Date.now() + "@mariage.com",
     "DTSTAMP:20260517T120000Z",
     "DTSTART:20260822T173000Z", 
     "DTEND:20260822T200000Z",
     "SUMMARY:Mariage de Sami & Khadija 💍",
     "DESCRIPTION:Célébration du mariage à l'hôtel Golden Carthage Gammarth.",
     "LOCATION:Golden Carthage Gammarth, Tunisie",
     "END:VEVENT",
     "END:VCALENDAR"
   ].join("\r\n");

   const blob = new Blob([icsContent], { type: "text/calendar;charset=utf-8;" });
   const link = document.createElement("a");
   link.href = window.URL.createObjectURL(blob);
   link.setAttribute("download", "Mariage_Sami_Khadija.ics");
   document.body.appendChild(link);
   link.click();
   document.body.removeChild(link);
 });
 </script>
</body>
</html>
